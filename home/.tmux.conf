# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # true colour
set -g history-limit 50000
set -g buffer-limit 20
set -sg escape-time 0          # remove Esc delay (important for vim)
set -g display-time 1500
set -g remain-on-exit off
set -g repeat-time 300
setw -g allow-rename off
setw -g automatic-rename off
set -g set-titles on
set -g set-titles-string '#h — #S — #W'

# ── Mouse ─────────────────────────────────────────────────────────────────────
set -g mouse on

# ── Indexing ──────────────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Reloading ─────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Window / pane creation ────────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Vim-style pane navigation ─────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Vim-style pane resizing ───────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window navigation ─────────────────────────────────────────────────────────
bind -r p previous-window
bind -r n next-window
bind Tab last-window

# ── Copy mode (vi) ────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi H   send-keys -X start-of-line
bind -T copy-mode-vi L   send-keys -X end-of-line

# ── Session management ────────────────────────────────────────────────────────
bind S choose-session
bind N new-session
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 80

# Colours
set -g status-style                 "bg=#1e1e2e,fg=#cdd6f4"
set -g pane-border-style            "fg=#45475a"
set -g pane-active-border-style     "fg=#89b4fa"
set -g message-style                "bg=#1e1e2e,fg=#cdd6f4"
setw -g window-status-style         "fg=#6c7086"
setw -g window-status-current-style "fg=#89b4fa,bold"
setw -g window-status-bell-style    "fg=#f38ba8,bold"

# Left: session name
set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#45475a]│ "

# Right: host | load | time
set -g status-right "#[fg=#a6e3a1]#H  #[fg=#45475a]│#[fg=#f5c2e7] %H:%M #[fg=#45475a]│#[fg=#cdd6f4] %d %b "

setw -g window-status-format         " #I:#W "
setw -g window-status-current-format " #I:#W "

# ── Activity monitoring ───────────────────────────────────────────────────────
setw -g monitor-activity on
set -g visual-activity off
